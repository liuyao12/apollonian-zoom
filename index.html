<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Apollonian Zoom</title>
<style>
:root{--sidebar-width:clamp(142px,24vw,170px)}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;font-family:sans-serif}
canvas{display:block;background:white}
#sidebar{position:fixed;left:0;top:0;width:var(--sidebar-width);height:100%;background:#fff;border-right:1px solid #ccc;z-index:10;overflow:auto;padding:10px;-webkit-overflow-scrolling:touch}
.app-title{font-size:15px;font-weight:700;line-height:1.15;margin-bottom:8px}
.card{border:1px solid #ccc;margin-bottom:8px;padding:6px 4px;min-height:44px;cursor:pointer;text-align:center;font-size:12px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.card:hover,.card.selected{background:#eee}
.thumb{display:block;margin:0 auto 4px auto;width:min(130px,100%);height:auto;aspect-ratio:13/10}
.label{text-align:center}
.credit{padding:3px 2px 12px;color:#555;font-size:11px;line-height:1.35}
.credit a{color:inherit;text-decoration:underline;text-underline-offset:2px}
.credit a:hover{color:#111}
.custom-button{width:100%;min-height:44px;margin:0 0 8px;border:1px solid #aaa;border-radius:4px;background:#fff;font:600 12px sans-serif;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.custom-button:hover,.custom-button.selected,.custom-button[aria-expanded="true"]{background:#eee}
.custom-form{margin:-1px 0 9px;padding:7px;border:1px solid #ccc;border-radius:4px;font-size:11px}
.custom-form label{display:block;margin-bottom:5px}
.custom-form input{width:100%;min-height:44px;padding:7px;border:1px solid #aaa;border-radius:3px;font:13px monospace}
.custom-actions{display:flex;gap:5px;margin-top:6px}
.custom-actions button{flex:1;min-height:44px;border:1px solid #aaa;border-radius:3px;background:#fff;cursor:pointer;touch-action:manipulation}
.custom-error{min-height:0;margin-top:5px;color:#a00;line-height:1.3}
.factor-control{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:44px;margin:2px 0 8px;font-size:12px;cursor:pointer;user-select:none;touch-action:manipulation}
.switch{position:relative;flex:0 0 auto;width:42px;height:24px}
.switch input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;z-index:1;cursor:pointer}
.slider{position:absolute;inset:0;border-radius:999px;background:#aaa;transition:background .15s ease}
.slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;border-radius:50%;background:#fff;box-shadow:0 1px 2px #555;transition:transform .15s ease}
.switch input:checked+.slider{background:#222}
.switch input:checked+.slider::before{transform:translateX(18px)}
.switch input:focus-visible+.slider{outline:2px solid #2673d9;outline-offset:2px}
.switch input:disabled+.slider{opacity:.45}
#canvas{margin-left:var(--sidebar-width);width:calc(100% - var(--sidebar-width));height:100%;touch-action:none;cursor:grab}
#canvas.interacting{cursor:grabbing}
#home-button{position:fixed;z-index:9;top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));width:46px;height:46px;padding:0;border:1px solid #aaa;border-radius:50%;background:rgba(255,255,255,.94);color:#111;box-shadow:0 2px 7px #0002;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#home-button svg{display:block;width:22px;height:22px;margin:auto;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#home-button:hover{background:#f2f2f2}
#home-button:active{transform:translateY(1px)}
#home-button:focus-visible{outline:2px solid #2673d9;outline-offset:2px}
#residue-panel{position:fixed;z-index:9;right:max(12px,env(safe-area-inset-right));bottom:max(12px,env(safe-area-inset-bottom));padding:9px;border:1px solid #bbb;border-radius:9px;background:rgba(255,255,255,.94);box-shadow:0 2px 8px #0002;user-select:none}
.residue-title{font-size:12px;font-weight:700;margin:0 0 2px}
.residue-help{font-size:10px;color:#555;margin:0 0 7px}
#residue-buttons{display:grid;grid-template-columns:repeat(8,36px);gap:4px}
.residue-button{width:36px;height:36px;padding:0;border:1px solid #aaa;border-radius:5px;background:#fff;color:#111;font:600 12px sans-serif;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.residue-button:not(:disabled){border-color:var(--residue-color);color:var(--residue-color);box-shadow:inset 0 -3px 0 var(--residue-color)}
.residue-button:hover:not(:disabled){background:#f3f5f7}
.residue-button[aria-pressed="true"]{background:var(--residue-color);border-color:var(--residue-color);color:#fff;font-weight:700;box-shadow:0 0 0 2px #c7d4e3}
.residue-button:disabled{background:#e7e7e7;border-color:#d1d1d1;color:#aaa;cursor:not-allowed}
.residue-button:focus-visible{outline:2px solid #2673d9;outline-offset:1px}
@media(max-width:600px){
 #residue-panel{z-index:11;left:max(8px,env(safe-area-inset-left));right:max(8px,env(safe-area-inset-right));padding:8px}
 #residue-buttons{grid-template-columns:repeat(8,minmax(0,1fr));gap:3px}
 .residue-button{width:100%;height:40px}
}
</style>
</head>
<body>
<div id="sidebar">
<div class="app-title">Apollonian Circle Packings</div>
<label class="factor-control">
<span>Prime factors</span>
<span class="switch"><input id="factor-toggle" type="checkbox" role="switch"><span class="slider" aria-hidden="true"></span></span>
</label>
<div id="presets"></div>
<button id="random-button" class="custom-button" type="button">Random configuration</button>
<button id="custom-button" class="custom-button" type="button" aria-expanded="false" aria-controls="custom-form">Custom configuration…</button>
<form id="custom-form" class="custom-form" hidden>
<label for="custom-curvatures">Three or four signed integer curvatures</label>
<input id="custom-curvatures" type="text" inputmode="text" autocomplete="off" spellcheck="false" aria-describedby="custom-error" placeholder="(-1, 2, 2)">
<div class="custom-actions"><button type="submit">Apply</button><button id="custom-cancel" type="button">Cancel</button></div>
<div id="custom-error" class="custom-error" role="alert"></div>
</form>
<div class="credit">A direct recreation of <a href="https://observablehq.com/@mcmcclur/integer-apollonian-packings" target="_blank" rel="noopener noreferrer">Mark McClure’s Observable notebook</a>, developed with Codex powered by GPT-5.6.</div>
</div>
<canvas id="canvas"></canvas>
<button id="home-button" type="button" aria-label="Return to home view" title="Home"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 10.5 12 3.8l8.5 6.7M5.8 9.2v10.5h12.4V9.2M9.5 19.7v-6.2h5v6.2"/></svg></button>
<section id="residue-panel" aria-label="Curvature residue classes modulo 24">
<div class="residue-title">Local–global mod 24</div>
<div class="residue-help">Rows mod 3 · columns mod 8</div>
<div id="residue-buttons"></div>
</section>
<script type="module" src="src/main.js"></script>
</body>
</html>
