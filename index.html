<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Apollonian Zoom</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:sans-serif}
canvas{display:block;background:white}
#sidebar{position:fixed;left:0;top:0;width:150px;height:100%;background:#fff;border-right:1px solid #ccc;z-index:10;overflow:auto;padding:8px}
.card{border:1px solid #ccc;margin-bottom:8px;padding:4px;cursor:pointer;text-align:center;font-size:12px}
.card:hover,.card.selected{background:#eee}
.thumb{display:block;margin:0 auto 4px auto;width:130px;height:100px}
.label{text-align:center}
.factor-control{display:flex;align-items:center;gap:4px;margin:7px 0;font-size:12px;cursor:pointer;user-select:none}
#canvas{margin-left:150px;width:calc(100% - 150px);height:100%}
</style>
</head>
<body>
<div id="sidebar">
<b>ACP</b>
<label class="factor-control"><input id="factor-toggle" type="checkbox"> Factor labels</label>
<div id="presets"></div>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="src/main.js"></script>
</body>
</html>
